name: release

# Image build + GHCR push for hollow-grid-c (Ferrite Wastes).
#   - make check on every push/PR
#   - docker build on every push/PR
#   - blocking upstream smoke.mjs (definition of done; see #17)
#   - push to GHCR (:<sha> + :latest) on push to main only
#
# After a green GHCR push on main, dispatches fleet-chezmoi ferrite-wastes-roll when the
# fleet stack is live (org secret FLEET_DISPATCH_TOKEN).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/skyphusion-labs/hollow-grid-c

jobs:
  build_docker:
    name: Test, build, and push
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install -y libcjson-dev libwebsockets-dev libcurl4-openssl-dev pkg-config

      - name: Setup Node.js (for smoke.mjs)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build and check
        run: make check

      - name: Build image
        run: docker build -t "$IMAGE:${GITHUB_SHA}" -t "$IMAGE:latest" .

      - name: Smoke conformance (blocking)
        run: |
          set -euo pipefail
          SMOKE_DIR=$(mktemp -d)
          git clone --depth 1 https://github.com/skyphusion-labs/the-hollow-grid.git "$SMOKE_DIR"
          SMOKE="$SMOKE_DIR/smoke.mjs"
          if [ ! -f "$SMOKE" ]; then
            echo "FAIL: smoke suite missing after clone ($SMOKE)" >&2
            exit 2
          fi
          docker rm -f hgc-ci >/dev/null 2>&1 || true
          docker run -d --name hgc-ci -p 18792:8792 "$IMAGE:latest"
          for i in $(seq 1 30); do curl -sf localhost:18792/health >/dev/null 2>&1 && break; sleep 1; done
          curl -sf localhost:18792/health >/dev/null
          # Full 159-check suite under CI load; 180s was truncating (#17).
          set +e
          MUD_URL=ws://localhost:18792/ws SMOKE_SLOW=2 \
            timeout 900 node "$SMOKE" > smoke.txt 2>&1
          smoke_rc=$?
          set -e
          docker rm -f hgc-ci >/dev/null 2>&1 || true
          pass=$(grep -c '^ok' smoke.txt || true)
          fail=$(grep -c '^FAIL' smoke.txt || true)
          skip=$(grep -c '^SKIP' smoke.txt || true)
          echo "smoke conformance: ${pass} ok / ${fail} fail / ${skip} skip (rc=${smoke_rc})"
          if [ "$smoke_rc" -eq 124 ]; then
            echo "FAIL: smoke suite timed out before completion" >&2
            exit 1
          fi
          if [ "$fail" -ne 0 ] || [ "$smoke_rc" -ne 0 ]; then
            echo "FAIL: smoke suite reported failures" >&2
            exit 1
          fi

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Log in to GHCR (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push to GHCR (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push "$IMAGE:${GITHUB_SHA}"
          docker push "$IMAGE:latest"
          echo "Pushed hollow-grid-c:${GITHUB_SHA}."

      - name: Dispatch ferrite-wastes roll to fleet-chezmoi (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          FLEET_DISPATCH_TOKEN: ${{ secrets.FLEET_DISPATCH_TOKEN }}
        run: bash .github/scripts/dispatch-fleet-ferrite-roll.sh

      - name: Clean up
        if: always()
        run: |
          docker rm -f hgc-ci >/dev/null 2>&1 || true
          docker logout ghcr.io || true
