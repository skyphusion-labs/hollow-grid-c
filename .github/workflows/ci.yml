name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install -y libcjson-dev libwebsockets-dev pkg-config
      - name: Build
        run: make check
