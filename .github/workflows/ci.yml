name: ci

on:
  push:
    branches: [main]
  pull_request:

# Public repo -> GitHub-hosted ubuntu-latest (fork-safe), never the fleet pool.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install -y libcjson-dev libwebsockets-dev libcurl4-openssl-dev pkg-config
      - name: Build and check
        run: make check
