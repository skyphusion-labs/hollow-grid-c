name: code-coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write
  code-quality: write
  pull-requests: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install C toolchain and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcjson-dev libwebsockets-dev libcurl4-openssl-dev pkg-config gcovr

      - name: Setup Node.js (for Smoke Engine)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clone Upstream Conformance Suite
        run: |
          git clone --depth 1 https://github.com/skyphusion-labs/the-hollow-grid.git upstream-mud
          cd upstream-mud && npm install

      - name: Build instrumented binaries
        run: make COVERAGE=1 all test

      - name: Run E2E Smoke Conformance Suite
        run: |
          set -euo pipefail
          DATA_DIR=$(mktemp -d) ./build/hollow-grid-c --addr 127.0.0.1:8792 &
          SERVER_PID=$!

          cleanup() {
            kill -SIGTERM $SERVER_PID 2>/dev/null || kill -9 $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
          }
          trap cleanup EXIT

          timeout 30s bash -c 'until curl -sf http://127.0.0.1:8792/health; do sleep 1; done'

          # Instrumented (-O0 --coverage) runs slower than release; give the full
          # 159-check suite generous headroom (#17, #18). SMOKE_SLOW spaces sends.
          set +e
          MUD_URL=ws://127.0.0.1:8792/ws SMOKE_SLOW=2 \
            timeout 900s node upstream-mud/smoke.mjs > smoke.txt 2>&1
          smoke_rc=$?
          set -e

          pass=$(grep -c '^ok' smoke.txt || true)
          fail=$(grep -c '^FAIL' smoke.txt || true)
          skip=$(grep -c '^SKIP' smoke.txt || true)
          echo "smoke conformance: ${pass} ok / ${fail} fail / ${skip} skip (rc=${smoke_rc})"
          cat smoke.txt

          if [ "$smoke_rc" -eq 124 ]; then
            echo "FAIL: smoke suite timed out before completion" >&2
            exit 1
          fi
          if [ "$fail" -ne 0 ] || [ "$smoke_rc" -ne 0 ]; then
            echo "FAIL: smoke suite reported failures" >&2
            exit 1
          fi

          # SIGTERM triggers graceful shutdown (main returns), flushing gcov data.
          cleanup
          trap - EXIT
          sleep 2

      - name: Generate Cobertura coverage report
        run: |
          # Ratchet floor: fail the job if line coverage regresses below the
          # agreed baseline (main was 58.6% post-#20; unit seams lift remote.c).
          # Raise this number as coverage climbs; never lower it silently.
          gcovr --root . --filter 'src/' \
            --exclude 'tests/' \
            --fail-under-line 55 \
            --cobertura coverage.xml \
            --print-summary

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: ./coverage.xml
          language: C
